name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Configurar Flutter 3.41.7
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.7"
          channel: stable
          cache: true

      - name: Instalar Flet CLI
        run: pip install flet==0.85.2 flet-cli==0.85.2

      - name: Aceptar licencias Android SDK
        run: yes | flutter doctor --android-licenses || true

      - name: Build APK
        run: |
          echo "y" | flet build apk \
            --project "SimplexIO" \
            --description "Método Simplex - Universidad de Panamá" \
            --org "edu.up.io"

      - name: Subir APK como Artifact
        uses: actions/upload-artifact@v4
        with:
          name: simplex-apk
          path: build/apk/*.apk
          retention-days: 30
